<!doctype html><html><head><meta charset="utf-8"><style>
  :root {
    color-scheme: light;
    --page-bg: #f6f8fb;
    --bg: #ffffff;
    --surface: #f8fafc;
    --surface-strong: #eef2f7;
    --text: #111827;
    --muted: #475569;
    --border: #64748b;
    --primary: #1d4ed8;
    --primary-hover: #1e40af;
    --success-bg: #ecfdf3;
    --success-border: #bbf7d0;
    --success-text: #166534;
    --info-bg: #eff6ff;
    --info-border: #bfdbfe;
    --info-text: #1e3a8a;
    --focus: #2563eb;
    --shadow: 0 1px 2px rgba(15, 23, 42, .08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    width: 360px;
    margin: 0;
    padding: 18px;
    background: var(--page-bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  .header {
    margin-bottom: 16px;
  }

  .title {
    margin: 0;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: .01em;
    line-height: 1.25;
  }

  .onboarding-guide {
    margin: 7px 0 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .word-input {
    flex: 1;
    min-width: 0;
    min-height: 44px;
    padding: 10px 13px;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    background: var(--bg);
    font: inherit;
  }

  .word-input::placeholder {
    color: var(--muted);
  }

  .word-input:focus-visible,
  button:focus-visible,
  .color-input:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 2px;
  }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    min-height: 44px;
    border: 1px solid transparent;
    border-radius: 12px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
  }

  button:disabled,
  .word-input:disabled {
    cursor: not-allowed;
    opacity: 1;
  }

  button:disabled {
    color: #334155;
    background: #e2e8f0;
    border-color: var(--border);
  }

  .word-input:disabled {
    color: #334155;
    background: #e2e8f0;
  }

  .add-button {
    padding: 0 16px;
    color: #fff;
    background: var(--primary);
  }

  .add-button:hover:not(:disabled) {
    background: var(--primary-hover);
  }

  .status-message {
    min-height: 0;
    margin-bottom: 14px;
    padding: 8px 10px;
    border: 1px solid transparent;
    border-radius: 10px;
    color: var(--muted);
    background: var(--surface);
    font-size: 12px;
    line-height: 1.45;
  }

  .status-message:empty {
    margin: 0;
    padding: 0;
    border: 0;
  }

  .status-message--loading,
  .status-message--info {
    color: var(--info-text);
    background: var(--info-bg);
    border-color: var(--info-border);
  }

  .status-message--success {
    color: var(--success-text);
    background: var(--success-bg);
    border-color: var(--success-border);
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .section-title {
    margin: 0;
    color: var(--text);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  .word-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0;
    margin: 0;
    list-style: none;
  }

  .word-item,
  .empty-state,
  .loading-state {
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg);
    box-shadow: var(--shadow);
  }

  .word-item {
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 52px;
    padding: 10px 12px;
  }

  .word-text {
    flex: 1;
    min-width: 0;
    overflow-wrap: anywhere;
    font-weight: 600;
    line-height: 1.35;
  }

  .color-input {
    width: 44px;
    height: 44px;
    min-height: 44px;
    flex: 0 0 44px;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }

  .color-badge {
    width: 16px;
    height: 16px;
    flex: 0 0 16px;
    border: 1px solid rgba(17, 24, 39, .24);
    border-radius: 5px;
  }

  .delete-button {
    width: 44px;
    min-height: 44px;
    padding: 0;
    color: var(--muted);
    background: transparent;
    border-color: transparent;
    font-size: 20px;
    line-height: 1;
  }

  .delete-button:hover {
    color: var(--text);
    background: var(--surface-strong);
  }

  .empty-state,
  .loading-state {
    padding: 16px 14px;
    color: var(--muted);
    text-align: left;
  }

  .empty-state-title {
    margin: 0 0 6px;
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
  }

  .empty-state-description,
  .empty-state-guide {
    margin: 0;
  }

  .empty-state-guide {
    margin-top: 8px;
    font-weight: 600;
  }

  .loading-state {
    color: var(--info-text);
    background: var(--info-bg);
    border-color: var(--info-border);
    font-weight: 600;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0 12px;
  }

  .premium-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }

  .upgrade-button {
    min-height: 44px;
    padding: 0 16px;
    color: var(--primary);
    background: #eff6ff;
    border-color: #bfdbfe;
    font-size: 12px;
  }
</style></head><body>
  <header class="header">
    <h1 id="appName" class="title">みつけるマーカー</h1>
    <p id="onboardingGuide" class="onboarding-guide">まずは見つけたい言葉を1つ追加して、開いているページでマーカーを試せます。</p>
  </header>
  <main id="app" aria-labelledby="appName">
    <form id="addWordForm" class="input-row">
      <label id="wordInputLabel" class="visually-hidden" for="wordInput">追加するキーワード</label>
      <input type="text" id="wordInput" class="word-input" placeholder="キーワードを追加..." aria-describedby="onboardingGuide statusMessage" aria-controls="wordList">
      <button id="addButton" class="add-button" type="submit">追加</button>
    </form>
    <div id="statusMessage" class="status-message" role="status" aria-live="polite" aria-atomic="true"></div>
    <section class="word-list-section" aria-labelledby="wordListHeading">
      <div class="list-header">
        <h2 id="wordListHeading" class="section-title">登録キーワード</h2>
      </div>
      <ul id="wordList" class="word-list" aria-busy="true" aria-live="polite" aria-relevant="additions removals text" aria-labelledby="wordListHeading"></ul>
    </section>
  </main>
  <hr class="divider">
  <section id="premiumArea" class="premium-area" aria-live="polite">
    <span id="premiumStatus"></span>
    <button id="upgradeButton" class="upgrade-button" hidden></button>
  </section>
  <script type="module" src="/src/popup.ts"></script>
</body></html>
