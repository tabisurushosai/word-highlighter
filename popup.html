<!doctype html><html><head><meta charset="utf-8"></head><body style="width:320px;font-family:system-ui;padding:12px">
  <h3 id="appName">みつけるマーカー</h3>
  <div id="app">
    <div style="display:flex; gap:8px; margin-bottom:12px">
      <input type="text" id="wordInput" style="flex:1" placeholder="キーワードを追加...">
      <button id="addButton">追加</button>
    </div>
    <div id="wordList" style="display:flex; flex-direction:column; gap:4px"></div>
  </div>
  <hr style="border:none; border-top:1px solid #eee; margin:16px 0">
  <div id="premiumArea" style="font-size:12px; color:#666; text-align:center">
    <span id="premiumStatus"></span>
    <button id="upgradeButton" style="display:none; margin-top:4px; font-size:12px; cursor:pointer"></button>
  </div>
  <script type="module" src="/src/popup.ts"></script>
</body></html>
