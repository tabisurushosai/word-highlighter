<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>みつけるマーカー</title><style>
  :root {
    color-scheme: light;
    --page-bg: #eef2f7;
    --bg: #ffffff;
    --surface-soft: #f8fafc;
    --surface-strong: #e2e8f0;
    --text: #0f172a;
    --muted: #334155;
    --muted-soft: #475569;
    --border: #cbd5e1;
    --border-strong: #94a3b8;
    --primary: #1d4ed8;
    --primary-hover: #1e3a8a;
    --success-bg: #ecfdf5;
    --success-border: #86efac;
    --success-text: #14532d;
    --info-bg: #eff6ff;
    --info-border: #93c5fd;
    --info-text: #1e3a8a;
    --focus: #2563eb;
    --focus-ring: 0 0 0 4px rgba(37, 99, 235, .22);
    --shadow-panel: 0 14px 34px rgba(15, 23, 42, .10);
    --shadow-card: 0 4px 14px rgba(15, 23, 42, .06);
  }

  * {
    box-sizing: border-box;
  }

  body {
    width: min(100vw, 380px);
    margin: 0;
    padding: 16px;
    background: var(--page-bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.55;
  }

  .header {
    margin-bottom: 14px;
    padding: 2px 2px 0;
  }

  .title {
    margin: 0;
    font-size: 21px;
    font-weight: 700;
    letter-spacing: .005em;
    line-height: 1.2;
  }

  .onboarding-guide {
    margin: 12px 0 0;
    padding: 12px 14px;
    border: 1px solid var(--info-border);
    border-left-width: 4px;
    border-radius: 14px;
    color: var(--info-text);
    background: var(--info-bg);
    font-size: 13px;
    line-height: 1.55;
  }

  main {
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--bg);
    box-shadow: var(--shadow-panel);
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .word-input {
    flex: 1;
    min-width: 0;
    min-height: 48px;
    padding: 12px 14px;
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    color: var(--text);
    background: var(--bg);
    font: inherit;
  }

  .word-input::placeholder {
    color: var(--muted-soft);
  }

  .word-input:focus-visible,
  button:focus-visible,
  .color-input:focus-visible {
    outline: 3px solid var(--focus);
    outline-offset: 3px;
    box-shadow: var(--focus-ring);
  }

  button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 48px;
    min-height: 48px;
    border: 1px solid transparent;
    border-radius: 14px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
  }

  button:disabled,
  .word-input:disabled {
    cursor: not-allowed;
    opacity: 1;
  }

  button:disabled {
    color: var(--muted);
    background: var(--surface-strong);
    border-color: var(--border);
  }

  .word-input:disabled {
    color: var(--muted);
    background: var(--surface-strong);
  }

  .add-button {
    padding: 0 18px;
    color: #fff;
    background: var(--primary);
  }

  .add-button:hover:not(:disabled) {
    background: var(--primary-hover);
  }

  .status-message {
    min-height: 0;
    margin: 0 0 16px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-left-width: 4px;
    border-radius: 12px;
    color: var(--muted);
    background: var(--surface-soft);
    font-size: 13px;
    line-height: 1.5;
  }

  .status-message:empty {
    margin: 0;
    padding: 0;
    border: 0;
  }

  .status-message--loading,
  .status-message--info {
    color: var(--info-text);
    background: var(--info-bg);
    border-color: var(--info-border);
  }

  .status-message--loading {
    font-weight: 600;
  }

  .status-message--loading::before {
    content: "";
    display: inline-block;
    width: .65em;
    height: .65em;
    margin-right: 8px;
    border: 2px solid currentColor;
    border-radius: 50%;
    vertical-align: -.08em;
  }

  .status-message--success {
    color: var(--success-text);
    background: var(--success-bg);
    border-color: var(--success-border);
    font-weight: 600;
  }

  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  .word-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 0;
    margin: 0;
    list-style: none;
  }

  .word-item,
  .empty-state,
  .loading-state {
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--bg);
    box-shadow: var(--shadow-card);
  }

  .word-item {
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 58px;
    padding: 10px 12px 10px 14px;
  }

  .word-item:focus-within {
    border-color: var(--focus);
    box-shadow: var(--focus-ring), var(--shadow-card);
  }

  .word-text {
    flex: 1;
    min-width: 0;
    overflow-wrap: anywhere;
    font-weight: 600;
    line-height: 1.4;
  }

  .color-input {
    width: 48px;
    height: 48px;
    min-height: 48px;
    flex: 0 0 48px;
    padding: 0;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
  }

  .color-badge {
    width: 18px;
    height: 18px;
    flex: 0 0 18px;
    border: 1px solid rgba(17, 24, 39, .24);
    border-radius: 6px;
  }

  .delete-button {
    width: 48px;
    min-height: 48px;
    padding: 0;
    color: var(--muted-soft);
    background: transparent;
    border-color: transparent;
    font-size: 20px;
    line-height: 1;
  }

  .delete-button:hover {
    color: var(--text);
    background: var(--surface-strong);
  }

  .empty-state,
  .loading-state {
    padding: 20px 16px;
    color: var(--muted);
    text-align: left;
  }

  .empty-state {
    background: linear-gradient(180deg, var(--bg), var(--surface-soft));
  }

  .empty-state-title {
    margin: 0 0 8px;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
  }

  .empty-state-description,
  .empty-state-guide,
  .empty-state-action {
    margin: 0;
    color: var(--muted);
  }

  .empty-state-guide {
    margin-top: 10px;
    font-weight: 600;
  }

  .empty-state-action {
    margin-top: 12px;
    padding: 10px 12px;
    border: 1px solid var(--info-border);
    border-radius: 12px;
    color: var(--info-text);
    background: var(--info-bg);
    font-weight: 600;
  }

  .loading-state {
    color: var(--info-text);
    background: var(--info-bg);
    border-color: var(--info-border);
    font-weight: 600;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0 12px;
  }

  .premium-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface-soft);
    color: var(--muted-soft);
    font-size: 12px;
    line-height: 1.45;
    text-align: center;
  }

  .upgrade-button {
    min-height: 48px;
    padding: 0 16px;
    color: var(--primary);
    background: #eff6ff;
    border-color: var(--info-border);
    font-size: 12px;
  }
</style></head><body>
  <header class="header">
    <h1 id="appName" class="title">みつけるマーカー</h1>
    <p id="onboardingGuide" class="onboarding-guide" role="note" hidden>まずは見つけたい言葉を1つ追加して、開いているページでマーカーを試せます。</p>
  </header>
  <main id="app" aria-labelledby="appName">
    <form id="addWordForm" class="input-row" aria-describedby="keyboardHelp">
      <label id="wordInputLabel" class="visually-hidden" for="wordInput">追加するキーワード</label>
      <input type="text" id="wordInput" class="word-input" placeholder="キーワードを追加..." aria-describedby="statusMessage" aria-controls="wordList">
      <button id="addButton" class="add-button" type="submit">追加</button>
    </form>
    <p id="keyboardHelp" class="visually-hidden">Tabキーで操作を移動し、EnterキーまたはSpaceキーでボタンを実行できます。</p>
    <div id="statusMessage" class="status-message" role="status" aria-live="polite" aria-atomic="true"></div>
    <section class="word-list-section" aria-labelledby="wordListHeading">
      <div class="list-header">
        <h2 id="wordListHeading" class="section-title">登録キーワード</h2>
      </div>
      <ul id="wordList" class="word-list" aria-busy="true" aria-live="polite" aria-relevant="additions removals text" aria-labelledby="wordListHeading"></ul>
    </section>
  </main>
  <hr class="divider">
  <section id="premiumArea" class="premium-area" aria-live="polite">
    <span id="premiumStatus"></span>
    <button id="upgradeButton" class="upgrade-button" hidden></button>
  </section>
  <script type="module" src="/src/popup.ts"></script>
</body></html>
